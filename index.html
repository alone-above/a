<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AloneAbove</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   ALONEABOVE — FULL SPA
   Aesthetic: Dark luxury editorial. Raw & refined.
   ═══════════════════════════════════════════════ */

:root{
  --bg:#080808;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --surface:#161616;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);
  --ink:#f0ede8;
  --ink2:#888;
  --ink3:#555;
  --accent:#c8ff00;       /* acid lime — brand punch */
  --accent2:#ff3c3c;      /* error / danger */
  --accent3:#3cffa0;      /* success green */
  --font-d:"Bebas Neue",sans-serif;
  --font-b:"Montserrat",sans-serif;
  --r:12px;
  --transition:.25s cubic-bezier(.4,0,.2,1);
  --nav-h:62px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{
  height:100%;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-b);
  font-size:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── SCROLLABLE CONTENT ── */
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 16px)}

/* ── NAV BAR ── */
.navbar{
  height:var(--nav-h);
  background:rgba(8,8,8,.96);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 4px;
  flex-shrink:0;
  position:relative;
  z-index:200;
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 0;
  background:none;
  border:none;
  color:var(--ink3);
  font-family:var(--font-b);
  font-size:.58rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:color var(--transition);
  position:relative;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}
.nav-btn.active svg{filter:drop-shadow(0 0 6px var(--accent))}
.cart-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  background:var(--accent);color:#000;
  width:16px;height:16px;border-radius:50%;
  font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);transition:all .2s;
}
.cart-badge.show{opacity:1;transform:scale(1)}

/* ── PAGES ── */
.page{display:none;min-height:100%}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.top-bar{
  padding:16px 16px 0;
  position:sticky;top:0;z-index:100;
  background:linear-gradient(to bottom,var(--bg) 80%,transparent);
  padding-bottom:8px;
}
.logo{
  font-family:var(--font-d);
  font-size:2.2rem;
  letter-spacing:.06em;
  line-height:1;
}
.logo span{color:var(--accent)}
.drop-tag{
  font-size:.6rem;letter-spacing:.2em;
  color:var(--ink2);text-transform:uppercase;margin-top:2px;
  display:flex;align-items:center;gap:6px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent3);
  box-shadow:0 0 8px var(--accent3);
  animation:blink 1.4s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SECTION LABEL ── */
.sec-label{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 16px 8px;
  font-size:.62rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink2);
  border-bottom:1px solid var(--border);
  margin-bottom:0;
}

/* ── PRODUCT CARDS ── */
.product-grid{padding:12px;display:flex;flex-direction:column;gap:12px}

.product-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color var(--transition),transform var(--transition);
  position:relative;
}
.product-card:active{transform:scale(.985)}
.product-card:hover{border-color:var(--border2)}

.product-img-wrap{
  width:100%;height:200px;overflow:hidden;
  background:var(--bg3);
  position:relative;
}
.product-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .5s ease;display:block;
}
.product-card:hover .product-img-wrap img{transform:scale(1.04)}
.product-img-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;
}
.product-badge{
  position:absolute;top:10px;left:10px;
  background:var(--accent);color:#000;
  font-size:.58rem;font-weight:700;letter-spacing:.1em;
  padding:3px 8px;text-transform:uppercase;
}

.product-body{padding:16px}
.product-name{
  font-family:var(--font-d);font-size:1.6rem;
  letter-spacing:.03em;line-height:1.1;margin-bottom:6px;
}
.product-desc{
  font-size:.72rem;color:var(--ink2);line-height:1.6;
  margin-bottom:14px;font-weight:300;
}
.product-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.product-price{
  font-family:var(--font-d);font-size:1.7rem;
  letter-spacing:.04em;color:var(--accent);
}

.btn-primary{
  background:var(--accent);color:#000;
  border:none;padding:10px 18px;
  font-family:var(--font-b);font-size:.7rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  border-radius:6px;cursor:pointer;
  transition:transform .15s,opacity .15s;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn-primary:active{transform:scale(.94);opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.btn-secondary{
  background:transparent;color:var(--ink);
  border:1px solid var(--border2);padding:10px 16px;
  font-family:var(--font-b);font-size:.7rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  border-radius:6px;cursor:pointer;
  transition:all .15s;
}
.btn-secondary:active{background:var(--bg3)}

.btn-danger{
  background:var(--accent2);color:#fff;
  border:none;padding:8px 14px;
  font-family:var(--font-b);font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  border-radius:6px;cursor:pointer;
  transition:opacity .15s;
}
.btn-danger:active{opacity:.7}

/* ── PROFILE PAGE ── */
.profile-hero{
  padding:24px 16px 16px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
  margin-bottom:0;
}
.avatar-wrap{position:relative}
.avatar{
  width:80px;height:80px;border-radius:50%;
  border:2px solid var(--accent);
  object-fit:cover;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:1px solid var(--accent);opacity:.4;
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.profile-name{font-family:var(--font-d);font-size:1.8rem;letter-spacing:.05em;text-align:center}
.profile-username{font-size:.72rem;color:var(--ink2);letter-spacing:.1em}
.profile-id{font-size:.62rem;color:var(--ink3);margin-top:2px;letter-spacing:.06em}

.profile-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  border-bottom:1px solid var(--border);
}
.stat-item{
  padding:16px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-item:last-child{border-right:none}
.stat-val{font-family:var(--font-d);font-size:1.6rem;color:var(--accent)}
.stat-lbl{font-size:.6rem;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

.profile-menu{padding:12px}
.menu-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 12px;border-radius:var(--r);
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:8px;cursor:pointer;
  transition:border-color var(--transition);
}
.menu-item:active{background:var(--bg3)}
.menu-item svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.6;flex-shrink:0}
.menu-item-text{flex:1}
.menu-item-title{font-weight:600;font-size:.85rem}
.menu-item-sub{font-size:.65rem;color:var(--ink2);margin-top:1px}
.menu-chevron{color:var(--ink3);font-size:.8rem}

/* ── CART PAGE ── */
.cart-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;gap:16px;text-align:center;
}
.cart-empty-icon{font-size:3rem;opacity:.4}
.cart-empty-title{font-family:var(--font-d);font-size:1.6rem;letter-spacing:.04em;opacity:.5}
.cart-empty-sub{font-size:.75rem;color:var(--ink2)}

.cart-items{padding:12px;display:flex;flex-direction:column;gap:10px}
.cart-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
  display:flex;gap:12px;align-items:center;
}
.cart-item-img{
  width:60px;height:60px;border-radius:8px;
  background:var(--bg3);overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;
}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-family:var(--font-d);color:var(--accent);font-size:1.1rem;margin-top:2px}
.cart-item-qty{
  display:flex;align-items:center;gap:8px;margin-top:6px;
}
.qty-btn{
  width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;font-weight:700;
  transition:background .15s;
}
.qty-btn:active{background:var(--bg2)}
.qty-val{font-size:.85rem;font-weight:700;min-width:20px;text-align:center}

.cart-footer{
  padding:12px 16px;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:10px;
  position:sticky;bottom:0;
}
.cart-total-row{display:flex;justify-content:space-between;align-items:center}
.cart-total-lbl{font-size:.72rem;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase}
.cart-total-val{font-family:var(--font-d);font-size:1.8rem;color:var(--accent)}
.cart-checkout-btn{width:100%;justify-content:center;padding:14px}

/* ── PAYMENT MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:500;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  width:100%;padding:24px 20px 32px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:90vh;overflow-y:auto;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px}
.modal-title{font-family:var(--font-d);font-size:1.6rem;letter-spacing:.05em;margin-bottom:4px}
.modal-sub{font-size:.72rem;color:var(--ink2);margin-bottom:20px}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:var(--bg3);border:none;color:var(--ink2);
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}

.payment-summary{
  background:var(--surface);border-radius:var(--r);
  padding:14px;margin-bottom:16px;
  border:1px solid var(--border);
}
.pay-row{
  display:flex;justify-content:space-between;
  font-size:.78rem;padding:4px 0;
}
.pay-row.total{
  border-top:1px solid var(--border);margin-top:8px;padding-top:10px;
  font-weight:700;font-size:.9rem;
}
.pay-row.total span:last-child{color:var(--accent);font-family:var(--font-d);font-size:1.2rem}

.payment-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.pay-method{
  display:flex;align-items:center;gap:12px;
  padding:14px;border-radius:var(--r);
  border:2px solid var(--border);background:var(--surface);
  cursor:pointer;transition:border-color .2s;
}
.pay-method.selected{border-color:var(--accent)}
.pay-method-icon{font-size:1.4rem;width:28px;text-align:center}
.pay-method-info{flex:1}
.pay-method-name{font-weight:600;font-size:.85rem}
.pay-method-desc{font-size:.65rem;color:var(--ink2);margin-top:1px}
.pay-radio{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s;
}
.pay-method.selected .pay-radio{border-color:var(--accent)}
.pay-radio-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);opacity:0;transition:opacity .2s;
}
.pay-method.selected .pay-radio-dot{opacity:1}

.pay-test-badge{
  background:rgba(200,255,0,.12);border:1px solid rgba(200,255,0,.3);
  color:var(--accent);font-size:.62rem;padding:2px 8px;border-radius:20px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  display:inline-block;margin-left:8px;
}

/* ── ORDER SUCCESS ── */
.order-success{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;text-align:center;padding:20px 0;
}
.success-icon{
  font-size:3rem;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:var(--font-d);font-size:1.8rem;letter-spacing:.05em}
.success-sub{font-size:.75rem;color:var(--ink2);line-height:1.6;max-width:240px}
.order-id{
  font-size:.7rem;color:var(--ink3);font-family:var(--font-d);
  letter-spacing:.2em;margin-top:4px;
}

/* ── HISTORY PAGE ── */
.history-empty{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;padding:60px 24px;text-align:center;
}
.history-items{padding:12px;display:flex;flex-direction:column;gap:10px}
.history-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
  position:relative;overflow:hidden;
}
.history-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent);
}
.history-order-id{font-size:.6rem;color:var(--ink3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.history-items-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.history-item-row{display:flex;justify-content:space-between;font-size:.78rem}
.history-item-name{color:var(--ink2)}
.history-item-price{font-weight:600;color:var(--ink)}
.history-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px}
.history-total{font-family:var(--font-d);font-size:1.1rem;color:var(--accent)}
.history-status{
  font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;
}
.status-completed{background:rgba(60,255,160,.12);color:var(--accent3)}
.status-processing{background:rgba(200,255,0,.12);color:var(--accent)}
.history-date{font-size:.62rem;color:var(--ink3);margin-top:6px}

/* ── ADMIN PAGE ── */
.admin-header{
  background:linear-gradient(135deg,#1a1a00,#080808);
  border-bottom:1px solid rgba(200,255,0,.2);
  padding:20px 16px 14px;
}
.admin-title{font-family:var(--font-d);font-size:1.6rem;letter-spacing:.1em;color:var(--accent)}
.admin-subtitle{font-size:.65rem;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

.admin-tabs{
  display:flex;border-bottom:1px solid var(--border);
  overflow-x:auto;padding:0 12px;gap:0;
}
.admin-tab{
  padding:12px 16px;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  font-weight:600;color:var(--ink3);cursor:pointer;border:none;background:none;
  white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;
}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.admin-panel{display:none;padding:12px}
.admin-panel.active{display:block}

.admin-products-list{display:flex;flex-direction:column;gap:8px}
.admin-product-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px;
  display:flex;gap:10px;align-items:center;
}
.admin-product-thumb{
  width:48px;height:48px;border-radius:8px;background:var(--bg3);
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.admin-product-thumb img{width:100%;height:100%;object-fit:cover}
.admin-product-info{flex:1;min-width:0}
.admin-product-name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-product-price{font-size:.75rem;color:var(--accent);font-family:var(--font-d);margin-top:2px}
.admin-product-actions{display:flex;gap:6px}
.admin-icon-btn{
  width:32px;height:32px;border-radius:6px;border:none;
  background:var(--bg3);color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:.9rem;
}
.admin-icon-btn:active{transform:scale(.9)}
.admin-icon-btn.edit{color:var(--accent)}
.admin-icon-btn.del{color:var(--accent2)}

/* ── FORM STYLES ── */
.form-group{margin-bottom:14px}
.form-label{
  display:block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink2);margin-bottom:6px;font-weight:600;
}
.form-input,.form-textarea{
  width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;color:var(--ink);font-family:var(--font-b);font-size:.85rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{min-height:80px;resize:vertical;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.admin-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.admin-stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;text-align:center;
}
.admin-stat-val{font-family:var(--font-d);font-size:2rem;color:var(--accent)}
.admin-stat-lbl{font-size:.62rem;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

.orders-admin-list{display:flex;flex-direction:column;gap:8px}
.order-admin-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px;
}
.order-admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-admin-id{font-size:.65rem;color:var(--ink3);letter-spacing:.1em;font-family:var(--font-d)}
.order-admin-user{font-size:.8rem;font-weight:600}
.order-admin-items{font-size:.72rem;color:var(--ink2);margin-bottom:8px;line-height:1.5}
.order-admin-footer{display:flex;justify-content:space-between;align-items:center}
.order-admin-total{font-family:var(--font-d);font-size:1.1rem;color:var(--accent)}

/* ── TOAST ── */
#toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;width:calc(100% - 32px);max-width:360px;
  align-items:center;
}
.toast-item{
  background:#fff;color:#000;
  padding:12px 18px;border-radius:10px;
  font-size:.78rem;font-weight:700;letter-spacing:.04em;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
  transition:opacity .3s;text-align:center;
  max-width:100%;
}
.toast-item.success{background:var(--accent);color:#000}
.toast-item.error{background:var(--accent2);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* ── SKELETON ── */
.skeleton{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--surface) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
  border-radius:var(--r);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:280px;margin:12px;border-radius:var(--r)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:0 16px}

/* ── PRODUCT DETAIL MODAL ── */
.product-detail .modal{padding:0;overflow:hidden}
.pd-img{width:100%;height:220px;object-fit:cover;display:block}
.pd-img-placeholder{width:100%;height:220px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:4rem}
.pd-body{padding:20px}
.pd-name{font-family:var(--font-d);font-size:2rem;letter-spacing:.04em;margin-bottom:6px}
.pd-price{font-family:var(--font-d);font-size:2rem;color:var(--accent);margin-bottom:12px}
.pd-desc{font-size:.78rem;color:var(--ink2);line-height:1.7;margin-bottom:20px}
.pd-actions{display:flex;gap:10px}
.pd-actions .btn-primary{flex:1;justify-content:center;padding:14px}

/* scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── SHIMMER FOR IMGS ── */
.img-loading{background:var(--bg3)}

/* ── ADMIN ACCESS DENIED ── */
.access-denied{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;gap:12px;text-align:center;
}
.access-icon{font-size:3rem;opacity:.4}
.access-title{font-family:var(--font-d);font-size:1.4rem;letter-spacing:.06em;opacity:.5}
.access-sub{font-size:.72rem;color:var(--ink2)}
</style>
</head>
<body>

<!-- ═══ TOAST CONTAINER ═══ -->
<div id="toast"></div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">

  <!-- ── PAGE: SHOP ── -->
  <div id="page-shop" class="page active">
    <div class="top-bar">
      <div class="logo">ALONE<span>ABOVE</span></div>
      <div class="drop-tag"><span class="live-dot"></span>DROP 001 · LIVE NOW</div>
    </div>
    <div class="sec-label">
      <span>— КАТАЛОГ</span>
      <span id="item-count">...</span>
    </div>
    <div id="product-grid" class="product-grid">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <!-- ── PAGE: CART ── -->
  <div id="page-cart" class="page">
    <div class="top-bar">
      <div class="logo">ALONE<span>ABOVE</span></div>
      <div class="drop-tag">КОРЗИНА</div>
    </div>
    <div id="cart-content"></div>
  </div>

  <!-- ── PAGE: HISTORY ── -->
  <div id="page-history" class="page">
    <div class="top-bar">
      <div class="logo">ALONE<span>ABOVE</span></div>
      <div class="drop-tag">ИСТОРИЯ ЗАКАЗОВ</div>
    </div>
    <div class="sec-label"><span>— МОИ ЗАКАЗЫ</span><span id="orders-count">0</span></div>
    <div id="history-content"></div>
  </div>

  <!-- ── PAGE: PROFILE ── -->
  <div id="page-profile" class="page">
    <div class="top-bar">
      <div class="logo">ALONE<span>ABOVE</span></div>
      <div class="drop-tag">МОЙ ПРОФИЛЬ</div>
    </div>
    <div id="profile-content"></div>
  </div>

  <!-- ── PAGE: ADMIN ── -->
  <div id="page-admin" class="page">
    <div class="admin-header">
      <div class="admin-title">⚡ ADMIN PANEL</div>
      <div class="admin-subtitle">AloneAbove Management</div>
    </div>
    <div id="admin-content"></div>
  </div>

</div><!-- /app -->

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
  <button class="nav-btn active" onclick="navigate('shop')" id="nav-shop">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Магазин
  </button>
  <button class="nav-btn" onclick="navigate('cart')" id="nav-cart">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.69l1.64-9.31H6"/></svg>
    Корзина
    <div class="cart-badge" id="cart-badge">0</div>
  </button>
  <button class="nav-btn" onclick="navigate('history')" id="nav-history">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Заказы
  </button>
  <button class="nav-btn" onclick="navigate('profile')" id="nav-profile">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Профиль
  </button>
</nav>

<!-- ═══ MODALS ═══ -->

<!-- Product Detail -->
<div class="modal-overlay product-detail" id="modal-product" onclick="if(event.target===this)closeModal('modal-product')">
  <div class="modal" style="padding:0;border-radius:20px 20px 0 0;">
    <div class="modal-handle" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:2"></div>
    <div id="product-detail-content"></div>
  </div>
</div>

<!-- Payment -->
<div class="modal-overlay" id="modal-payment" onclick="if(event.target===this)closeModal('modal-payment')">
  <div class="modal" style="position:relative">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('modal-payment')">✕</button>
    <div id="payment-content"></div>
  </div>
</div>

<!-- Edit Product (Admin) -->
<div class="modal-overlay" id="modal-edit-product" onclick="if(event.target===this)closeModal('modal-edit-product')">
  <div class="modal" style="position:relative">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('modal-edit-product')">✕</button>
    <div id="edit-product-content"></div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════
// ║  ALONEABOVE MINI APP — FULL SPA
// ║  Single file, no dependencies beyond TG WebApp SDK
// ╚══════════════════════════════════════════════════════════

"use strict";

// ── Telegram WebApp ──────────────────────────────────────────
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

// ── Admin IDs — ВАШ TELEGRAM ID ЗДЕСЬ ───────────────────────
// Совпадает с admin_ids в config.json
const ADMIN_IDS = [7774179831];

// ── State ────────────────────────────────────────────────────
const STATE = {
  products: [],
  cart: loadLS("aa_cart", []),
  orders: loadLS("aa_orders", []),
  user: null,
  selectedPayMethod: "card_test",
  currentPage: "shop",
  adminTab: "dashboard",
};

// ── Utils ────────────────────────────────────────────────────
function loadLS(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; }
  catch { return def; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}
function fmtPrice(n) {
  return Number(n).toLocaleString("ru-RU") + "\u00A0₽";
}
function genId() {
  return "AA" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("ru-RU", {day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function isAdmin() {
  return ADMIN_IDS.includes(STATE.user?.id);
}

// ── Toast ────────────────────────────────────────────────────
let _toastQ = [];
function showToast(msg, type="") {
  const container = document.getElementById("toast");
  const el = document.createElement("div");
  el.className = "toast-item" + (type ? " "+type : "");
  el.textContent = msg;
  container.appendChild(el);
  tg?.HapticFeedback?.notificationOccurred(type === "error" ? "error" : "success");
  setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }, 2500);
}

// ── Modal ────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id)?.classList.add("open");
}
function closeModal(id) {
  document.getElementById(id)?.classList.remove("open");
}

// ── Navigation ───────────────────────────────────────────────
function navigate(page) {
  STATE.currentPage = page;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + page)?.classList.add("active");
  document.getElementById("nav-" + page)?.classList.add("active");
  // render page
  if (page === "cart") renderCart();
  if (page === "history") renderHistory();
  if (page === "profile") renderProfile();
  if (page === "admin") renderAdmin();
  tg?.HapticFeedback?.selectionChanged();
}

// ── PRODUCTS ─────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch("products.json?v=" + Date.now(), {cache:"no-store"});
    if (!r.ok) throw new Error();
    const d = await r.json();
    STATE.products = Array.isArray(d) ? d : (d.products ?? []);
  } catch {
    STATE.products = FALLBACK_PRODUCTS;
  }
  renderShop();
}

function renderShop() {
  const grid = document.getElementById("product-grid");
  const count = document.getElementById("item-count");
  if (!grid) return;

  grid.innerHTML = "";
  const n = STATE.products.length;
  if (count) count.textContent = n + " позиц" + (n===1?"ия":n<5?"ии":"ий");

  if (!n) {
    grid.innerHTML = "<p style='padding:40px;text-align:center;color:var(--ink2)'>Товары не найдены</p>";
    return;
  }

  STATE.products.forEach((p, i) => {
    const card = document.createElement("article");
    card.className = "product-card";
    card.style.animationDelay = (i * 0.07) + "s";
    card.innerHTML = `
      <div class="product-img-wrap" onclick="openProduct(${p.id})">
        ${p.image
          ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=product-img-placeholder>${esc(p.emoji||"🖤")}</div>'">`
          : `<div class="product-img-placeholder">${esc(p.emoji||"🖤")}</div>`}
        <div class="product-badge">NEW</div>
      </div>
      <div class="product-body">
        <h2 class="product-name" onclick="openProduct(${p.id})">${esc(p.name)}</h2>
        <p class="product-desc">${esc(p.description)}</p>
        <div class="product-footer">
          <span class="product-price">${fmtPrice(p.price)}</span>
          <div style="display:flex;gap:8px">
            <button class="btn-secondary" onclick="openProduct(${p.id})">Детали</button>
            <button class="btn-primary" onclick="addToCart(${p.id},this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
              В корзину
            </button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── PRODUCT DETAIL ───────────────────────────────────────────
function openProduct(id) {
  const p = STATE.products.find(x => x.id === id);
  if (!p) return;
  const el = document.getElementById("product-detail-content");
  el.innerHTML = `
    ${p.image
      ? `<img class="pd-img" src="${esc(p.image)}" alt="${esc(p.name)}" onerror="this.outerHTML='<div class=pd-img-placeholder>${esc(p.emoji||"🖤")}</div>'">`
      : `<div class="pd-img-placeholder">${esc(p.emoji||"🖤")}</div>`}
    <div class="pd-body">
      <div class="pd-name">${esc(p.name)}</div>
      <div class="pd-price">${fmtPrice(p.price)}</div>
      <div class="pd-desc">${esc(p.description)}</div>
      <div class="pd-actions">
        <button class="btn-secondary" onclick="closeModal('modal-product')">Назад</button>
        <button class="btn-primary" onclick="addToCart(${p.id},this);closeModal('modal-product')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Добавить в корзину
        </button>
      </div>
    </div>
  `;
  openModal("modal-product");
}

// ── CART ─────────────────────────────────────────────────────
function addToCart(id, btn) {
  const p = STATE.products.find(x => x.id === id);
  if (!p) return;
  const existing = STATE.cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else STATE.cart.push({id, name:p.name, price:p.price, image:p.image||"", emoji:p.emoji||"🖤", qty:1});
  saveLS("aa_cart", STATE.cart);
  updateCartBadge();
  showToast("✓ " + p.name + " — в корзине", "success");
  tg?.HapticFeedback?.impactOccurred("medium");
  if (btn) {
    btn.textContent = "✓ Добавлено";
    setTimeout(() => { if(btn){ btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> В корзину`; }}, 1500);
  }
}

function changeQty(id, delta) {
  const item = STATE.cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) STATE.cart = STATE.cart.filter(x => x.id !== id);
  saveLS("aa_cart", STATE.cart);
  updateCartBadge();
  renderCart();
}

function removeFromCart(id) {
  STATE.cart = STATE.cart.filter(x => x.id !== id);
  saveLS("aa_cart", STATE.cart);
  updateCartBadge();
  renderCart();
}

function cartTotal() {
  return STATE.cart.reduce((s, x) => s + x.price * x.qty, 0);
}
function cartCount() {
  return STATE.cart.reduce((s, x) => s + x.qty, 0);
}

function updateCartBadge() {
  const badge = document.getElementById("cart-badge");
  const count = cartCount();
  badge.textContent = count;
  badge.classList.toggle("show", count > 0);
}

function renderCart() {
  const el = document.getElementById("cart-content");
  if (!el) return;

  if (!STATE.cart.length) {
    el.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-title">КОРЗИНА ПУСТА</div>
        <div class="cart-empty-sub">Добавьте товары из каталога</div>
        <button class="btn-primary" onclick="navigate('shop')" style="margin-top:8px">← В магазин</button>
      </div>`;
    return;
  }

  const items = STATE.cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">
        ${item.image
          ? `<img src="${esc(item.image)}" alt="${esc(item.name)}" onerror="this.parentNode.innerHTML='${esc(item.emoji)}'">`
          : item.emoji}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(item.name)}</div>
        <div class="cart-item-price">${fmtPrice(item.price * item.qty)}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="btn-danger" style="margin-left:auto;padding:4px 10px;font-size:.6rem" onclick="removeFromCart(${item.id})">✕</button>
        </div>
      </div>
    </div>
  `).join("");

  el.innerHTML = `
    <div class="cart-items">${items}</div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-lbl">Итого</span>
        <span class="cart-total-val">${fmtPrice(cartTotal())}</span>
      </div>
      <button class="btn-primary cart-checkout-btn" onclick="openPayment()">
        Оформить заказ — ${fmtPrice(cartTotal())}
      </button>
    </div>
  `;
}

// ── PAYMENT ──────────────────────────────────────────────────
const PAYMENT_METHODS = [
  {id:"card_test", icon:"💳", name:"Тестовая карта", desc:"Бесплатно · Только для теста"},
  {id:"tg_pay",   icon:"✈️", name:"Telegram Pay",   desc:"Быстро · Тестовый режим"},
  {id:"sbp",      icon:"⚡", name:"СБП",             desc:"Система быстрых платежей · Тест"},
];

function openPayment() {
  if (!STATE.cart.length) return showToast("Корзина пуста", "error");
  const el = document.getElementById("payment-content");
  const methods = PAYMENT_METHODS.map(m => `
    <div class="pay-method${m.id===STATE.selectedPayMethod?" selected":""}" onclick="selectPayMethod('${m.id}')">
      <div class="pay-method-icon">${m.icon}</div>
      <div class="pay-method-info">
        <div class="pay-method-name">${m.name}<span class="pay-test-badge">ТЕСТ</span></div>
        <div class="pay-method-desc">${m.desc}</div>
      </div>
      <div class="pay-radio"><div class="pay-radio-dot"></div></div>
    </div>
  `).join("");

  const itemsList = STATE.cart.map(x =>
    `<div class="pay-row"><span>${esc(x.name)} ×${x.qty}</span><span>${fmtPrice(x.price*x.qty)}</span></div>`
  ).join("");

  el.innerHTML = `
    <div class="modal-title">ОФОРМЛЕНИЕ</div>
    <div class="modal-sub">Выберите способ оплаты</div>
    <div class="payment-summary">
      ${itemsList}
      <div class="pay-row total"><span>ИТОГО</span><span>${fmtPrice(cartTotal())}</span></div>
    </div>
    <div class="payment-methods" id="pay-methods">${methods}</div>
    <button class="btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="processPayment()">
      Оплатить — ${fmtPrice(cartTotal())}
    </button>
    <p style="text-align:center;font-size:.62rem;color:var(--ink3);margin-top:10px">
      ⚠️ Тестовый режим — деньги не списываются
    </p>
  `;
  openModal("modal-payment");
}

function selectPayMethod(id) {
  STATE.selectedPayMethod = id;
  document.querySelectorAll(".pay-method").forEach(el => {
    el.classList.toggle("selected", el.getAttribute("onclick").includes(`'${id}'`));
  });
}

function processPayment() {
  const btn = document.querySelector("#modal-payment .btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Обработка..."; }

  setTimeout(() => {
    const order = {
      id: genId(),
      ts: Date.now(),
      items: [...STATE.cart],
      total: cartTotal(),
      method: STATE.selectedPayMethod,
      status: "completed",
      user: STATE.user?.id || "guest",
    };
    STATE.orders.unshift(order);
    saveLS("aa_orders", STATE.orders);

    // Send to bot
    const payload = JSON.stringify({
      type: "order",
      order_id: order.id,
      items: order.items.map(x => ({name:x.name, qty:x.qty, price:x.price})),
      total: order.total,
      method: order.method,
    });
    try { if (tg?.initDataUnsafe?.query_id) tg.sendData(payload); } catch {}

    // Clear cart
    STATE.cart = [];
    saveLS("aa_cart", STATE.cart);
    updateCartBadge();

    // Show success
    const el = document.getElementById("payment-content");
    el.innerHTML = `
      <div class="order-success">
        <div class="success-icon">🎉</div>
        <div class="success-title">ЗАКАЗ ПРИНЯТ!</div>
        <div class="success-sub">Менеджер свяжется с вами для уточнения деталей доставки</div>
        <div class="order-id">ЗАКАЗ ${order.id}</div>
        <button class="btn-primary" style="margin-top:16px" onclick="closeModal('modal-payment');navigate('history')">
          Мои заказы →
        </button>
      </div>
    `;
    tg?.HapticFeedback?.notificationOccurred("success");
  }, 1400);
}

// ── HISTORY ──────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById("history-content");
  const counter = document.getElementById("orders-count");
  if (!el) return;
  if (counter) counter.textContent = STATE.orders.length;

  if (!STATE.orders.length) {
    el.innerHTML = `
      <div class="history-empty">
        <div style="font-size:3rem;opacity:.3">📋</div>
        <div style="font-family:var(--font-d);font-size:1.4rem;opacity:.4;letter-spacing:.06em">НЕТ ЗАКАЗОВ</div>
        <div style="font-size:.72rem;color:var(--ink2)">Ваши заказы появятся здесь</div>
        <button class="btn-primary" onclick="navigate('shop')" style="margin-top:8px">← В магазин</button>
      </div>`;
    return;
  }

  const cards = STATE.orders.map(o => {
    const itemsHtml = o.items.map(x =>
      `<div class="history-item-row"><span class="history-item-name">${esc(x.name)} ×${x.qty}</span><span class="history-item-price">${fmtPrice(x.price*x.qty)}</span></div>`
    ).join("");
    return `
      <div class="history-card">
        <div class="history-order-id">Заказ ${o.id}</div>
        <div class="history-items-list">${itemsHtml}</div>
        <div class="history-footer">
          <span class="history-total">${fmtPrice(o.total)}</span>
          <span class="history-status status-completed">Выполнен</span>
        </div>
        <div class="history-date">${fmtDate(o.ts)}</div>
      </div>
    `;
  }).join("");

  el.innerHTML = `<div class="history-items">${cards}</div>`;
}

// ── ADMIN PANEL ───────────────────────────────────────────────
function renderAdmin() {
  const el = document.getElementById("admin-content");
  if (!el) return;

  if (!isAdmin()) {
    el.innerHTML = `
      <div class="access-denied">
        <div class="access-icon">🔒</div>
        <div class="access-title">ДОСТУП ЗАКРЫТ</div>
        <div class="access-sub">Только для администраторов</div>
      </div>`;
    return;
  }

  el.innerHTML = `
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('dashboard',this)">Дашборд</button>
      <button class="admin-tab" onclick="switchAdminTab('products',this)">Товары</button>
      <button class="admin-tab" onclick="switchAdminTab('add',this)">+ Добавить</button>
      <button class="admin-tab" onclick="switchAdminTab('orders',this)">Заказы</button>
    </div>
    <div id="admin-panel-dashboard" class="admin-panel active"></div>
    <div id="admin-panel-products" class="admin-panel"></div>
    <div id="admin-panel-add" class="admin-panel"></div>
    <div id="admin-panel-orders" class="admin-panel"></div>
  `;
  renderAdminDashboard();
  renderAdminProducts();
  renderAdminAdd();
  renderAdminOrders();
}

function switchAdminTab(tab, btn) {
  document.querySelectorAll(".admin-tab").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".admin-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("admin-panel-"+tab)?.classList.add("active");
}

function renderAdminDashboard() {
  const el = document.getElementById("admin-panel-dashboard");
  if (!el) return;
  const allOrders = STATE.orders;
  const revenue = allOrders.reduce((s,o) => s+o.total, 0);
  el.innerHTML = `
    <div style="padding:12px">
      <div class="admin-stats-grid">
        <div class="admin-stat-card">
          <div class="admin-stat-val">${STATE.products.length}</div>
          <div class="admin-stat-lbl">Товаров</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-val">${allOrders.length}</div>
          <div class="admin-stat-lbl">Заказов</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-val">${fmtPrice(revenue).replace("₽","")}</div>
          <div class="admin-stat-lbl">Выручка ₽</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-val">${cartCount()}</div>
          <div class="admin-stat-lbl">В корзинах</div>
        </div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px">
        <div style="font-size:.65rem;letter-spacing:.15em;color:var(--ink2);text-transform:uppercase;margin-bottom:10px">Информация о магазине</div>
        <div style="font-size:.8rem;line-height:2;color:var(--ink2)">
          🌐 GitHub Pages: <span style="color:var(--accent)">aibek201156.github.io/aloneabove</span><br>
          🤖 Бот: <span style="color:var(--ink)">AloneAbove Bot</span><br>
          📦 Товаров активно: <span style="color:var(--ink)">${STATE.products.length}</span>
        </div>
      </div>
    </div>
  `;
}

function renderAdminProducts() {
  const el = document.getElementById("admin-panel-products");
  if (!el) return;
  const rows = STATE.products.map(p => `
    <div class="admin-product-row">
      <div class="admin-product-thumb">
        ${p.image
          ? `<img src="${esc(p.image)}" alt="" onerror="this.parentNode.textContent='${esc(p.emoji||"🖤")}'">`
          : (p.emoji||"🖤")}
      </div>
      <div class="admin-product-info">
        <div class="admin-product-name">${esc(p.name)}</div>
        <div class="admin-product-price">${fmtPrice(p.price)}</div>
      </div>
      <div class="admin-product-actions">
        <button class="admin-icon-btn edit" onclick="openEditProduct(${p.id})" title="Редактировать">✏️</button>
        <button class="admin-icon-btn del" onclick="deleteProduct(${p.id})" title="Удалить">🗑</button>
      </div>
    </div>
  `).join("");
  el.innerHTML = `
    <div style="padding:12px">
      <div class="admin-products-list">${rows || '<p style="color:var(--ink2);text-align:center;padding:20px">Нет товаров</p>'}</div>
    </div>
  `;
}

function renderAdminAdd(prefill={}) {
  const el = document.getElementById("admin-panel-add");
  if (!el) return;
  el.innerHTML = `
    <div style="padding:12px">
      <div style="font-size:.65rem;letter-spacing:.15em;color:var(--ink2);text-transform:uppercase;margin-bottom:14px">Новый товар</div>
      <div class="form-group">
        <label class="form-label">Название *</label>
        <input class="form-input" id="add-name" placeholder="Оверсайз Худи «VOID»" value="${esc(prefill.name||"")}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Цена ₽ *</label>
          <input class="form-input" id="add-price" type="number" placeholder="4990" value="${esc(String(prefill.price||""))}">
        </div>
        <div class="form-group">
          <label class="form-label">Эмодзи</label>
          <input class="form-input" id="add-emoji" placeholder="🖤" value="${esc(prefill.emoji||"")}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="add-desc" placeholder="Описание товара...">${esc(prefill.description||"")}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Ссылка на изображение</label>
        <input class="form-input" id="add-image" placeholder="https://..." value="${esc(prefill.image||"")}">
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="addProduct()">
        + Добавить товар
      </button>
    </div>
  `;
}

function addProduct() {
  const name  = document.getElementById("add-name")?.value.trim();
  const price = parseInt(document.getElementById("add-price")?.value);
  const emoji = document.getElementById("add-emoji")?.value.trim() || "🖤";
  const desc  = document.getElementById("add-desc")?.value.trim();
  const image = document.getElementById("add-image")?.value.trim();
  if (!name || !price) return showToast("Заполни название и цену", "error");
  const newId = (Math.max(0, ...STATE.products.map(p=>p.id)) + 1);
  STATE.products.push({id:newId, name, price, description:desc||"", emoji, image:image||""});
  showToast("✓ Товар добавлен", "success");
  renderShop();
  renderAdminProducts();
  renderAdminDashboard();
  renderAdminAdd();
  showToast("⚠️ Не забудь обновить products.json на GitHub!", "");
}

function deleteProduct(id) {
  if (!confirm("Удалить товар?")) return;
  STATE.products = STATE.products.filter(p => p.id !== id);
  showToast("Товар удалён", "");
  renderShop();
  renderAdminProducts();
  renderAdminDashboard();
}

function openEditProduct(id) {
  const p = STATE.products.find(x => x.id === id);
  if (!p) return;
  const el = document.getElementById("edit-product-content");
  el.innerHTML = `
    <div class="modal-title" style="margin-bottom:16px">РЕДАКТИРОВАТЬ</div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input class="form-input" id="edit-name" value="${esc(p.name)}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Цена ₽</label>
        <input class="form-input" id="edit-price" type="number" value="${p.price}">
      </div>
      <div class="form-group">
        <label class="form-label">Эмодзи</label>
        <input class="form-input" id="edit-emoji" value="${esc(p.emoji||"")}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <textarea class="form-textarea" id="edit-desc">${esc(p.description||"")}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Ссылка на изображение</label>
      <input class="form-input" id="edit-image" value="${esc(p.image||"")}">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-secondary" style="flex:1" onclick="closeModal('modal-edit-product')">Отмена</button>
      <button class="btn-primary" style="flex:2;justify-content:center" onclick="saveEditProduct(${id})">Сохранить</button>
    </div>
  `;
  openModal("modal-edit-product");
}

function saveEditProduct(id) {
  const p = STATE.products.find(x => x.id === id);
  if (!p) return;
  p.name        = document.getElementById("edit-name")?.value.trim() || p.name;
  p.price       = parseInt(document.getElementById("edit-price")?.value) || p.price;
  p.emoji       = document.getElementById("edit-emoji")?.value.trim() || p.emoji;
  p.description = document.getElementById("edit-desc")?.value.trim() || p.description;
  p.image       = document.getElementById("edit-image")?.value.trim() || p.image;
  closeModal("modal-edit-product");
  renderShop();
  renderAdminProducts();
  showToast("✓ Товар обновлён", "success");
  showToast("⚠️ Не забудь обновить products.json на GitHub!", "");
}

function renderAdminOrders() {
  const el = document.getElementById("admin-panel-orders");
  if (!el) return;
  if (!STATE.orders.length) {
    el.innerHTML = `<div style="padding:40px;text-align:center;color:var(--ink2);font-size:.8rem">Нет заказов</div>`;
    return;
  }
  const rows = STATE.orders.map(o => `
    <div class="order-admin-row">
      <div class="order-admin-head">
        <span class="order-admin-id">${o.id}</span>
        <span class="history-status status-completed">Выполнен</span>
      </div>
      <div class="order-admin-user">User ID: ${o.user}</div>
      <div class="order-admin-items">${o.items.map(x=>`${x.name} ×${x.qty}`).join(", ")}</div>
      <div class="order-admin-footer">
        <span class="order-admin-total">${fmtPrice(o.total)}</span>
        <span style="font-size:.62rem;color:var(--ink3)">${fmtDate(o.ts)}</span>
      </div>
    </div>
  `).join("");
  el.innerHTML = `<div style="padding:12px"><div class="orders-admin-list">${rows}</div></div>`;
}
