<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            padding: 15px 30px;
            background: #ffffff;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #e0e0e0;
        }
    </style>
    </head>
<body>

    <h1>Добро пожаловать</h1>
    <p>Нажмите ниже, чтобы перейти к видео</p>
    <a href="./edit/" class="btn">Перейти в /edit</a>

</body>
</html>
